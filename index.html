<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TajweedEasy - Online Quran Learning</title>
    
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        emerald: {
                            50: '#ecfdf5',
                            100: '#d1fae5',
                            200: '#a7f3d0',
                            300: '#6ee7b7',
                            400: '#34d399',
                            500: '#10b981',
                            600: '#059669',
                            700: '#047857',
                            800: '#065f46',
                            900: '#064e3b',
                            950: '#022c22',
                        }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'float-delayed': 'float 6s ease-in-out 3s infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'blob': 'blob 7s infinite',
                        'spin-slow': 'spin 3s linear infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Import Map -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
      }
    }
    </script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #059669; }
        
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        /* Markdown-like output styling for AI response */
        .ai-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .ai-content ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 1rem; }
        .ai-content p { margin-bottom: 0.75rem; }
        .ai-content strong { color: #065f46; font-weight: 700; }
        .ai-content h3 { font-size: 1.1rem; font-weight: 700; margin-top: 1rem; margin-bottom: 0.5rem; color: #047857; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased selection:bg-emerald-200 selection:text-emerald-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            BookOpen, GraduationCap, Users, Star, Menu, X, Check, 
            ArrowRight, Mail, Phone, MapPin, PlayCircle, Clock, Award, Loader2,
            Globe, Video, Calendar, ChevronDown, ChevronUp, Sparkles, 
            Bot, Send, MessageSquare, Compass, Heart, ShieldCheck
        } from 'lucide-react';
        
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, serverTimestamp } from 'firebase/firestore';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';

        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY_HERE",
            authDomain: "your-project.firebaseapp.com",
            projectId: "your-project-id",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };

        // Initialize Firebase safely
        let app, auth, db;
        let firebaseInitialized = false;

        try {
            if (firebaseConfig.apiKey !== "YOUR_API_KEY_HERE") {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                firebaseInitialized = true;
            }
        } catch (e) {
            console.error("Firebase Initialization Error:", e);
        }

        // --- GEMINI API HELPER (For Chatbot) ---
        const callGeminiAPI = async (prompt, systemInstruction = "") => {
            const apiKey = ""; // Environment provided key
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: systemInstruction }] }
                    })
                });
                const data = await response.json();
                if (data.error) {
                    console.error("Gemini API Error Details:", data.error);
                    throw new Error(data.error.message);
                }
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "I couldn't generate a response at this moment.";
            } catch (error) {
                console.error("Gemini API Connection Error:", error);
                return "Sorry, I'm having trouble connecting right now. Please try again later.";
            }
        };

        // --- UTILS: SCROLL ANIMATION HOOK ---
        const useOnScreen = (options) => {
            const ref = useRef(null);
            const [isVisible, setIsVisible] = useState(false);

            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) {
                        setIsVisible(true);
                        observer.disconnect();
                    }
                }, options);

                if (ref.current) observer.observe(ref.current);
                return () => { if (ref.current) observer.unobserve(ref.current); };
            }, [ref, options]);

            return [ref, isVisible];
        };

        // --- DATA ---
        const COURSES = [
            { id: 1, title: "Noorani Qaida", category: "Beginners", price: 25, image: "./images/qaida.png", features: "Perfect for kids and absolute beginners to learn alphabet pronunciation.", schedule: "5 days a week (Fully customizable based on your availability)", color: "from-blue-400 to-blue-600" },
            { id: 2, title: "Nazra Quran", category: "Recitation", price: 25, image: "https://images.unsplash.com/photo-1609599006353-e629aaabfeae?auto=format&fit=crop&w=600&q=80", features: "Develop the ability to read the Quran fluently by looking at the text.", schedule: "5 days a week (Fully customizable based on your availability)", color: "from-emerald-400 to-emerald-600" },
            { id: 3, title: "Hifz-e-Quran", category: "Advanced", price: 40, image: "./images/hifzequran.jpg", features: "Step-by-step memorization with rigorous daily revision techniques.", schedule: "5 days a week (Fully customizable based on your availability)", color: "from-purple-400 to-purple-600" },
            { id: 4, title: "Translation & Tafseer", category: "Understanding", price: 40, image: "./images/tafseer.jpg", features: "Understand the profound meanings, context, and lessons of the verses.", schedule: "5 days a week (Fully customizable based on your availability)", color: "from-orange-400 to-orange-600" },
            { id: 5, title: "Tajweed Rules", category: "Mastery", price: 25, image: "./images/tajweed.png", features: "Learn the correct articulation points and characteristics of Arabic letters.", schedule: "5 days a week (Fully customizable based on your availability)", color: "from-teal-400 to-teal-600" },
            { id: 6, title: "Islamic Studies", category: "Kids", price: 25, image: "./images/islamic.png", features: "A specialized curriculum covering basic Fiqh, Seerah, and daily Duas.", schedule: "5 days a week (Fully customizable based on your availability)", color: "from-pink-400 to-pink-600" }
        ];

        const FAQS = [
            { q: "Do you have female tutors?", a: "Yes, we have dedicated female tutors available for sisters and daughters to ensure a comfortable learning environment." },
            { q: "How do online classes work?", a: "Classes are conducted via Zoom or Skype. You share a screen with the tutor who guides you through the lesson in real-time, just like an in-person class." },
            { q: "Can I choose my own time and days?", a: "Absolutely. While our base fees cover 5 days a week, the specific days and times are completely customizable to match your time zone and daily routine. You can choose to study 3 days, on weekends, etc." },
            { q: "Is there a trial period?", a: "Yes, we offer a free trial. This gives you a chance to experience our teaching style and decide if it's the right fit for you." }
        ];

        const STATS_QUALITATIVE = [
            { label: "Learning Mode", value: "1-on-1 Classes" },
            { label: "Scheduling", value: "Highly Flexible" },
            { label: "Our Focus", value: "Tajweed & Tarteel" },
        ];

        const METHODOLOGY = [
            { icon: <Compass size={24} />, title: "Step-by-Step Approach", text: "We don't rush. We ensure every letter and rule is mastered before moving on to the next, building a strong foundation." },
            { icon: <Heart size={24} />, title: "Patient & Encouraging", text: "Learning the Quran should be a joyous journey. Our tutors are trained to be patient, especially with young children." },
            { icon: <ShieldCheck size={24} />, title: "Progress Tracking", text: "We keep track of your daily progress and regularly assess your reading to ensure continuous improvement." }
        ];

        // --- COMPONENTS ---

        const FadeIn = ({ children, delay = 0 }) => {
            const [ref, isVisible] = useOnScreen({ threshold: 0.1 });
            return (
                <div ref={ref} className={`transition-all duration-1000 transform ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10'}`} style={{ transitionDelay: `${delay}ms` }}>
                    {children}
                </div>
            );
        };

        // --- LLM COMPONENT: AI CHAT WIDGET ---
        const AIChatWidget = () => {
            const [isOpen, setIsOpen] = useState(false);
            const [messages, setMessages] = useState([
                { role: 'assistant', text: "Assalamu Alaikum! I am the TajweedEasy Assistant. Feel free to ask me about Tajweed rules, how our classes work, or general Quranic questions." }
            ]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages, isOpen]);

            const handleSend = async (e) => {
                e.preventDefault();
                if (!input.trim()) return;

                const userMsg = input;
                setInput('');
                setMessages(prev => [...prev, { role: 'user', text: userMsg }]);
                setIsTyping(true);

                const systemPrompt = "You are an AI teaching assistant for 'TajweedEasy', an online Quran academy. You help users with basic Tajweed rules, simple Quranic history, and explain that TajweedEasy offers 1-on-1 online classes, highly customizable scheduling (base is 5 days/week), and female tutors. Pricing is $25 for most courses, and $40 for Hifz/Translation. Be polite, encouraging, and concise. If they ask about enrolling, tell them to use the Free Trial button.";
                
                const response = await callGeminiAPI(userMsg, systemPrompt);
                
                setMessages(prev => [...prev, { role: 'assistant', text: response }]);
                setIsTyping(false);
            };

            return (
                <div className="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-4">
                    {/* Chat Window */}
                    <div className={`bg-white w-80 md:w-96 rounded-2xl shadow-2xl border border-emerald-100 transition-all duration-300 origin-bottom-right overflow-hidden ${isOpen ? 'scale-100 opacity-100' : 'scale-0 opacity-0 h-0'}`}>
                        {/* Header */}
                        <div className="bg-emerald-600 p-4 flex items-center justify-between text-white">
                            <div className="flex items-center gap-2">
                                <div className="bg-white/20 p-1.5 rounded-lg">
                                    <Bot size={20} />
                                </div>
                                <div>
                                    <h3 className="font-bold text-sm">TajweedEasy Assistant</h3>
                                    <p className="text-xs text-emerald-100 flex items-center gap-1">
                                        <span className="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span> Online
                                    </p>
                                </div>
                            </div>
                            <button onClick={() => setIsOpen(false)} className="hover:bg-emerald-700 p-1 rounded transition-colors"><X size={18} /></button>
                        </div>
                        
                        {/* Messages */}
                        <div className="h-80 overflow-y-auto p-4 bg-slate-50 space-y-4 custom-scrollbar">
                            {messages.map((msg, i) => (
                                <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-[80%] p-3 rounded-2xl text-sm leading-relaxed ${msg.role === 'user' ? 'bg-emerald-600 text-white rounded-br-none' : 'bg-white border border-slate-200 text-slate-700 rounded-bl-none shadow-sm'}`}>
                                        <div className="ai-content" dangerouslySetInnerHTML={{ __html: msg.text.replace(/\n/g, '<br/>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') }} />
                                    </div>
                                </div>
                            ))}
                            {isTyping && (
                                <div className="flex justify-start">
                                    <div className="bg-white border border-slate-200 p-3 rounded-2xl rounded-bl-none shadow-sm flex gap-1">
                                        <span className="w-2 h-2 bg-emerald-400 rounded-full animate-bounce"></span>
                                        <span className="w-2 h-2 bg-emerald-400 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></span>
                                        <span className="w-2 h-2 bg-emerald-400 rounded-full animate-bounce" style={{animationDelay: '0.4s'}}></span>
                                    </div>
                                </div>
                            )}
                            <div ref={messagesEndRef} />
                        </div>

                        {/* Input */}
                        <form onSubmit={handleSend} className="p-3 bg-white border-t border-slate-100 flex gap-2">
                            <input 
                                type="text" 
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                placeholder="Ask a question..."
                                className="flex-1 bg-slate-50 border border-slate-200 rounded-full px-4 py-2 text-sm focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all"
                            />
                            <button type="submit" disabled={!input.trim() || isTyping} className="bg-emerald-600 text-white p-2 rounded-full hover:bg-emerald-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-md">
                                <Send size={18} />
                            </button>
                        </form>
                    </div>

                    {/* Toggle Button */}
                    <button 
                        onClick={() => setIsOpen(!isOpen)} 
                        className={`p-4 rounded-full shadow-2xl text-white transition-all duration-300 hover:scale-110 flex items-center justify-center ${isOpen ? 'bg-slate-800 rotate-90' : 'bg-emerald-600'}`}
                    >
                        {isOpen ? <X size={28} /> : <MessageSquare size={28} />}
                        {!isOpen && (
                            <span className="absolute -top-1 -right-1 w-4 h-4 bg-green-400 rounded-full border-2 border-white animate-pulse"></span>
                        )}
                    </button>
                </div>
            );
        };

        // --- PRACTICAL COMPONENT: COURSE MATCHER ---
        const CourseMatcher = ({ onClose, scrollToSection }) => {
            const [step, setStep] = useState(1);
            const [data, setData] = useState({ target: 'myself', level: 'beginner' });
            const [recommendations, setRecommendations] = useState([]);

            const calculateMatch = (selectedLevel) => {
                let matches = [];
                if (selectedLevel === 'beginner') {
                    matches.push(COURSES.find(c => c.id === 1)); // Qaida
                    if (data.target === 'child') {
                        matches.push(COURSES.find(c => c.id === 6)); // Islamic Studies
                    }
                } else if (selectedLevel === 'reading') {
                    matches.push(COURSES.find(c => c.id === 2)); // Nazra
                    matches.push(COURSES.find(c => c.id === 5)); // Tajweed
                    if (data.target === 'child') {
                        matches.push(COURSES.find(c => c.id === 6)); // Islamic Studies
                    }
                } else if (selectedLevel === 'fluent') {
                    matches.push(COURSES.find(c => c.id === 3)); // Hifz
                    if (data.target === 'myself') {
                        matches.push(COURSES.find(c => c.id === 4)); // Translation
                        matches.push(COURSES.find(c => c.id === 5)); // Tajweed Rules
                    } else {
                        matches.push(COURSES.find(c => c.id === 6)); // Islamic Studies
                    }
                }
                
                setData(prev => ({...prev, level: selectedLevel}));
                setRecommendations(matches);
                setStep(3);
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-in fade-in duration-200">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col">
                        <div className="bg-slate-900 p-6 text-white flex justify-between items-start">
                            <div>
                                <h2 className="text-xl font-serif font-bold">Find Your Course</h2>
                                <p className="text-slate-400 text-sm">Let us recommend the perfect starting point.</p>
                            </div>
                            <button onClick={onClose} className="hover:bg-slate-800 p-2 rounded-full transition-colors"><X size={20}/></button>
                        </div>

                        <div className="p-8">
                            {step === 1 && (
                                <div className="space-y-6 animate-in slide-in-from-right-8 duration-300">
                                    <h3 className="text-lg font-bold text-slate-800">Who are you looking classes for?</h3>
                                    <div className="grid grid-cols-2 gap-4">
                                        <button onClick={() => { setData({...data, target: 'myself'}); setStep(2); }} className="p-6 border border-slate-200 rounded-2xl hover:border-emerald-500 hover:bg-emerald-50 transition-all text-center">
                                            <Users className="mx-auto mb-2 text-emerald-600" size={32}/>
                                            <span className="font-bold text-slate-700">For Myself</span>
                                        </button>
                                        <button onClick={() => { setData({...data, target: 'child'}); setStep(2); }} className="p-6 border border-slate-200 rounded-2xl hover:border-emerald-500 hover:bg-emerald-50 transition-all text-center">
                                            <Star className="mx-auto mb-2 text-emerald-600" size={32}/>
                                            <span className="font-bold text-slate-700">For My Child</span>
                                        </button>
                                    </div>
                                </div>
                            )}

                            {step === 2 && (
                                <div className="space-y-6 animate-in slide-in-from-right-8 duration-300">
                                    <h3 className="text-lg font-bold text-slate-800">What is the current reading level?</h3>
                                    <div className="space-y-3">
                                        <button onClick={() => calculateMatch('beginner')} className="w-full p-4 border border-slate-200 rounded-xl hover:border-emerald-500 text-left font-medium text-slate-700">Cannot read Arabic letters yet</button>
                                        <button onClick={() => calculateMatch('reading')} className="w-full p-4 border border-slate-200 rounded-xl hover:border-emerald-500 text-left font-medium text-slate-700">Can connect letters but reads slowly</button>
                                        <button onClick={() => calculateMatch('fluent')} className="w-full p-4 border border-slate-200 rounded-xl hover:border-emerald-500 text-left font-medium text-slate-700">Reads fluently, wants to memorize/learn rules</button>
                                    </div>
                                    <button onClick={() => setStep(1)} className="text-sm text-slate-400 hover:text-slate-600">← Back</button>
                                </div>
                            )}

                            {step === 3 && recommendations.length > 0 && (
                                <div className="text-center animate-in zoom-in-95 duration-300">
                                    <div className="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <Check className="text-emerald-600" size={32} />
                                    </div>
                                    <h3 className="text-slate-500 mb-4">We recommend these courses:</h3>
                                    
                                    <div className="space-y-3 mb-8 text-left max-h-[35vh] overflow-y-auto custom-scrollbar pr-2">
                                        {recommendations.map(rec => (
                                            <div key={rec.id} className="p-4 border border-emerald-100 bg-emerald-50 rounded-xl">
                                                <h2 className="text-lg font-bold text-slate-900 mb-1">{rec.title}</h2>
                                                <p className="text-xs text-slate-600">{rec.features}</p>
                                            </div>
                                        ))}
                                    </div>
                                    
                                    <div className="flex gap-4">
                                        <button onClick={onClose} className="flex-1 py-3 border border-slate-200 rounded-xl font-bold text-slate-600 hover:bg-slate-50 transition-colors">Close</button>
                                        <button onClick={() => { onClose(); scrollToSection('contact'); }} className="flex-1 py-3 bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700 shadow-lg shadow-emerald-200 transition-all">Start Free Trial</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const Navbar = ({ isScrolled, activeSection, scrollToSection, isMenuOpen, setIsMenuOpen, openMatcher }) => {
            const navItems = [
                { id: 'home', label: 'Home' },
                { id: 'courses', label: 'Courses' },
                { id: 'methodology', label: 'How We Teach' },
                { id: 'faq', label: 'FAQs' },
            ];

            return (
                <nav className={`fixed top-0 left-0 right-0 z-40 transition-all duration-300 ${isScrolled ? 'glass shadow-lg py-2' : 'bg-transparent py-4'}`}>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => scrollToSection('home')}>
                                <img src="./images/logobg.png" alt="TajweedEasy Logo" className="h-10 md:h-12 w-auto transform scale-[4.5] origin-left" />
                            </div>
                            
                            <div className="hidden md:flex items-center gap-8">
                                {navItems.map((item) => (
                                    <button key={item.id} onClick={() => scrollToSection(item.id)} className={`text-sm font-medium transition-all hover:-translate-y-0.5 ${activeSection === item.id ? 'text-emerald-600 font-bold' : 'text-slate-600 hover:text-emerald-600'}`}>{item.label}</button>
                                ))}
                                <button onClick={openMatcher} className="bg-white/80 backdrop-blur text-emerald-700 border border-emerald-200 px-4 py-2 rounded-full text-xs font-bold hover:bg-emerald-50 transition-all flex items-center gap-1.5">
                                    <Compass size={14} className="text-emerald-500" /> Find Course
                                </button>
                                <button onClick={() => scrollToSection('contact')} className="bg-slate-900 text-white px-6 py-2.5 rounded-full text-sm font-bold hover:bg-emerald-600 transition-all shadow-lg hover:shadow-emerald-500/20 transform hover:scale-105">
                                    Free Trial
                                </button>
                            </div>

                            <div className="md:hidden">
                                <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="p-2 text-slate-600 hover:bg-slate-100 rounded-lg">
                                    {isMenuOpen ? <X size={24} /> : <Menu size={24} />}
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    {isMenuOpen && (
                        <div className="md:hidden absolute top-full left-0 w-full bg-white/95 backdrop-blur-xl border-b border-slate-100 shadow-xl p-4 flex flex-col gap-2 animate-in slide-in-from-top-5 duration-200">
                            {navItems.map((item) => (
                                <button key={item.id} onClick={() => scrollToSection(item.id)} className="w-full text-left px-4 py-3 rounded-lg hover:bg-emerald-50 text-slate-600 font-medium">{item.label}</button>
                            ))}
                            <button onClick={openMatcher} className="w-full mt-2 bg-emerald-50 text-emerald-700 border border-emerald-200 px-4 py-3 rounded-lg font-bold flex items-center justify-center gap-2">
                                <Compass size={16} /> Course Matcher
                            </button>
                        </div>
                    )}
                </nav>
            );
        };

        const Hero = ({ scrollToSection, openMatcher }) => {
            return (
                <section id="home" className="relative min-h-screen flex items-center pt-20 overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
                        <div className="absolute top-[-10%] right-[-5%] w-[500px] h-[500px] bg-emerald-100 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob"></div>
                        <div className="absolute bottom-[-20%] left-[20%] w-[500px] h-[500px] bg-teal-100 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob animation-delay-4000"></div>
                    </div>

                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 w-full">
                        <div className="grid lg:grid-cols-2 gap-12 items-center">
                            <div className="space-y-8 text-center lg:text-left">
                                <FadeIn>
                                    <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/50 border border-emerald-100 backdrop-blur-sm shadow-sm text-emerald-800 font-bold text-xs uppercase tracking-wider mb-4">
                                        Welcome to TajweedEasy
                                    </div>
                                    <h1 className="text-5xl lg:text-7xl font-extrabold tracking-tight text-slate-900 leading-[1.1] font-serif">
                                        Master the Quran <br/>
                                        <span className="text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-teal-500">
                                            Step by Step
                                        </span>
                                    </h1>
                                    <p className="text-xl text-slate-600 max-w-lg mx-auto lg:mx-0 leading-relaxed">
                                        Join our dedicated tutors for 1-on-1 online sessions. We focus on correct pronunciation, highly flexible scheduling, and a supportive learning environment.
                                    </p>
                                </FadeIn>
                                
                                <FadeIn delay={200}>
                                    <div className="flex flex-wrap gap-4 justify-center lg:justify-start">
                                        <button onClick={() => scrollToSection('contact')} className="px-8 py-4 bg-slate-900 text-white font-bold rounded-full shadow-xl hover:bg-emerald-600 hover:shadow-emerald-500/30 transition-all transform hover:-translate-y-1 flex items-center gap-2">
                                            Start Free Trial <ArrowRight size={18} />
                                        </button>
                                        <button onClick={openMatcher} className="px-8 py-4 bg-white text-slate-700 font-bold rounded-full border border-slate-200 hover:border-emerald-300 hover:bg-emerald-50 transition-all flex items-center gap-2 group">
                                            <Compass size={18} className="text-emerald-500 group-hover:scale-110 transition-transform"/> Find Your Course
                                        </button>
                                    </div>
                                </FadeIn>

                                <FadeIn delay={400}>
                                    <div className="grid grid-cols-3 gap-4 border-t border-slate-200/60 pt-8 mt-4">
                                        {STATS_QUALITATIVE.map((stat, i) => (
                                            <div key={i}>
                                                <p className="text-lg lg:text-xl font-bold text-slate-900">{stat.value}</p>
                                                <p className="text-xs text-slate-500 font-medium uppercase tracking-wide">{stat.label}</p>
                                            </div>
                                        ))}
                                    </div>
                                </FadeIn>
                            </div>

                            <div className="relative hidden lg:block h-[600px]">
                                <div className="absolute right-0 top-10 w-4/5 h-[500px] rounded-[3rem] overflow-hidden shadow-2xl border-[8px] border-white animate-float">
                                    <img src="https://images.unsplash.com/photo-1609599006353-e629aaabfeae?auto=format&fit=crop&w=800&q=80" alt="Quran" className="w-full h-full object-cover" />
                                </div>
                                
                                <div className="absolute top-20 left-10 bg-white/90 backdrop-blur-md p-4 rounded-2xl shadow-xl border border-white/50 flex items-center gap-3 animate-float-delayed max-w-[220px]">
                                    <div className="bg-green-100 p-2 rounded-lg"><Check className="text-green-600" size={20}/></div>
                                    <div>
                                        <p className="text-xs text-slate-500 font-bold">Progress Tracking</p>
                                        <p className="text-sm font-bold text-slate-900">Structured Daily Lessons</p>
                                    </div>
                                </div>

                                <div className="absolute bottom-20 left-0 bg-white/90 backdrop-blur-md p-5 rounded-2xl shadow-xl border border-white/50 flex items-center gap-4 animate-float max-w-xs">
                                    <div className="w-12 h-12 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600 border-2 border-white shadow-sm">
                                        <Users size={24} />
                                    </div>
                                    <div>
                                        <p className="text-sm font-bold text-slate-900">Qualified Tutors</p>
                                        <p className="text-xs text-green-600 font-medium">Dedicated & Patient</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const CoursesGrid = () => {
            return (
                <section id="courses" className="py-24 bg-white relative">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="text-center max-w-3xl mx-auto mb-16">
                            <h2 className="text-3xl md:text-4xl font-bold text-slate-900 mb-4 font-serif">Curriculum Designed for You</h2>
                            <p className="text-slate-600">Structured learning paths for beginners, intermediate learners, and advanced students.</p>
                        </div>
                        
                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {COURSES.map((course, index) => (
                                <FadeIn key={course.id} delay={index * 100}>
                                    <div className="group relative bg-white rounded-2xl border border-slate-100 overflow-hidden hover:shadow-2xl transition-all duration-500 hover:-translate-y-1 flex flex-col h-full">
                                        <div className="h-48 overflow-hidden relative flex-shrink-0">
                                            <div className={`absolute inset-0 bg-gradient-to-br ${course.color} opacity-0 group-hover:opacity-20 transition-opacity z-10`}></div>
                                            <img src={course.image} alt={course.title} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                                            <div className="absolute top-4 right-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-xs font-bold shadow-sm z-20">{course.category}</div>
                                        </div>
                                        
                                        <div className="p-6 flex flex-col flex-grow">
                                            <h3 className="text-xl font-bold text-slate-900 mb-2 group-hover:text-emerald-600 transition-colors">{course.title}</h3>
                                            <p className="text-sm text-slate-600 mb-4 flex-grow">{course.features}</p>
                                            
                                            <div className="bg-emerald-50 border border-emerald-100 rounded-lg p-3 mb-6">
                                                <p className="text-xs text-emerald-800 flex items-start gap-2">
                                                    <Clock size={14} className="mt-0.5 flex-shrink-0"/>
                                                    <span>{course.schedule}</span>
                                                </p>
                                            </div>

                                            <div className="flex items-center justify-between border-t border-slate-100 pt-4 mt-auto">
                                                <span className="text-2xl font-bold text-slate-900">${course.price}<span className="text-sm text-slate-400 font-normal">/mo</span></span>
                                                <button className="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center group-hover:bg-emerald-600 group-hover:text-white transition-colors">
                                                    <ArrowRight size={18}/>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </FadeIn>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const MethodologySection = () => {
            return (
                <section id="methodology" className="py-24 bg-emerald-900 text-emerald-50 relative overflow-hidden">
                    <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/arabesque.png')] opacity-10"></div>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                        <div className="text-center mb-16">
                            <h2 className="text-3xl md:text-4xl font-bold text-white mb-4 font-serif">Our Teaching Methodology</h2>
                            <p className="text-emerald-200 max-w-2xl mx-auto">We focus on quality education, ensuring every student learns at their own pace in a supportive environment.</p>
                        </div>
                        <div className="grid md:grid-cols-3 gap-8">
                            {METHODOLOGY.map((method, index) => (
                                <FadeIn key={index} delay={index * 200}>
                                    <div className="bg-emerald-800/50 p-8 rounded-2xl backdrop-blur-sm border border-emerald-700 hover:bg-emerald-800 transition-colors text-center h-full">
                                        <div className="w-16 h-16 rounded-full bg-emerald-600 flex items-center justify-center text-white mx-auto mb-6 shadow-lg border-2 border-emerald-400">
                                            {method.icon}
                                        </div>
                                        <h3 className="text-xl font-bold text-white mb-4">{method.title}</h3>
                                        <p className="text-emerald-100 leading-relaxed">{method.text}</p>
                                    </div>
                                </FadeIn>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const FAQSection = ({ scrollToSection }) => {
            const [openIndex, setOpenIndex] = useState(0);

            return (
                <section id="faq" className="py-24 bg-slate-50">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="grid lg:grid-cols-2 gap-16 items-start">
                            <div>
                                <h2 className="text-3xl md:text-4xl font-bold text-slate-900 mb-6 font-serif">Frequently Asked Questions</h2>
                                <p className="text-slate-600 mb-8">Everything you need to know about starting your classes with TajweedEasy.</p>
                                
                                {/* USEFUL SUPPORT CARD INSTEAD OF STATIC IMAGE */}
                                <div className="bg-emerald-900 rounded-[2rem] p-10 text-white shadow-2xl relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-[300px] h-[300px] bg-emerald-500 rounded-full mix-blend-overlay filter blur-3xl opacity-40"></div>
                                    <div className="relative z-10 flex flex-col h-full justify-center">
                                        <div className="w-16 h-16 bg-white/10 rounded-2xl flex items-center justify-center mb-6 border border-white/20">
                                            <MessageSquare size={32} className="text-emerald-300" />
                                        </div>
                                        <h3 className="text-3xl font-bold font-serif mb-4">Still have questions?</h3>
                                        <p className="text-emerald-100 mb-8 leading-relaxed text-lg">
                                            Can't find the answer you're looking for? Our dedicated team of experienced tutors is here to help you start your Quranic journey.
                                        </p>
                                        <div className="space-y-4">
                                            <button onClick={() => scrollToSection('contact')} className="w-full py-4 bg-emerald-500 hover:bg-emerald-400 text-white rounded-xl font-bold transition-all shadow-lg flex items-center justify-center gap-2">
                                                <Mail size={18} /> Contact Support
                                            </button>
                                            <div className="flex items-center justify-center gap-2 text-sm text-emerald-200 mt-4">
                                                <Phone size={16} /> <span>+92 300 1234567</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="space-y-4">
                                {FAQS.map((faq, idx) => (
                                    <div key={idx} className="bg-white rounded-xl border border-slate-200 overflow-hidden transition-all">
                                        <button 
                                            onClick={() => setOpenIndex(openIndex === idx ? -1 : idx)}
                                            className="w-full flex items-center justify-between p-6 text-left font-bold text-slate-900 hover:bg-slate-50 transition-colors"
                                        >
                                            {faq.q}
                                            {openIndex === idx ? <ChevronUp size={20} className="text-emerald-600"/> : <ChevronDown size={20} className="text-slate-400"/>}
                                        </button>
                                        <div className={`px-6 text-slate-600 leading-relaxed overflow-hidden transition-all duration-300 ease-in-out ${openIndex === idx ? 'max-h-40 pb-6 opacity-100' : 'max-h-0 opacity-0'}`}>
                                            {faq.a}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const ContactSection = () => {
            const [formData, setFormData] = useState({ name: '', email: '', phone: '', course: 'Qaida' });
            const [status, setStatus] = useState('idle');
            
            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!firebaseInitialized) {
                    alert("Demo Mode: Data won't be saved (Firebase config missing).");
                    return;
                }
                setStatus('submitting');
                try {
                    await new Promise(r => setTimeout(r, 1500));
                    await addDoc(collection(db, 'contact_messages'), {
                        ...formData,
                        timestamp: serverTimestamp()
                    });
                    setStatus('success');
                } catch (e) {
                    setStatus('error');
                }
            };

            return (
                <section id="contact" className="relative py-24 bg-white overflow-hidden">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                        <div className="bg-slate-900 rounded-[3rem] overflow-hidden shadow-2xl flex flex-col lg:flex-row">
                            <div className="lg:w-5/12 p-10 md:p-16 relative overflow-hidden flex flex-col justify-between">
                                <div className="absolute top-0 right-0 w-[400px] h-[400px] bg-emerald-600 rounded-full mix-blend-overlay filter blur-3xl opacity-50"></div>
                                <div className="relative z-10">
                                    <h2 className="text-4xl font-bold mb-4 font-serif text-white">Start Your Trial</h2>
                                    <p className="text-emerald-100 mb-10 leading-relaxed">
                                        Book your free trial class today. Let us help you or your child connect with the Quran.
                                    </p>
                                    <div className="space-y-6">
                                        <div className="flex items-center gap-4 text-white">
                                            <div className="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center"><Phone size={20} /></div>
                                            <div>
                                                <p className="text-sm text-slate-400">WhatsApp / Call</p>
                                                <p className="font-bold">+92 300 1234567</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-4 text-white">
                                            <div className="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center"><Mail size={20} /></div>
                                            <div>
                                                <p className="text-sm text-slate-400">Email</p>
                                                <p className="font-bold">info@tajweedeasy.com</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:w-7/12 bg-white p-10 md:p-16">
                                <form onSubmit={handleSubmit} className="space-y-4">
                                    <div className="grid md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Student Name</label>
                                            <input type="text" required className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition-all" onChange={e => setFormData({...formData, name: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Phone Number</label>
                                            <input type="tel" required className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition-all" onChange={e => setFormData({...formData, phone: e.target.value})} />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Email</label>
                                        <input type="email" required className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition-all" onChange={e => setFormData({...formData, email: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Interested Course</label>
                                        <select className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition-all" onChange={e => setFormData({...formData, course: e.target.value})}>
                                            {COURSES.map(c => <option key={c.id} value={c.title}>{c.title}</option>)}
                                        </select>
                                    </div>
                                    <button type="submit" disabled={status === 'submitting'} className={`w-full py-4 mt-4 rounded-xl font-bold text-lg text-white transition-all shadow-lg transform active:scale-95 ${status === 'success' ? 'bg-green-500' : 'bg-emerald-600 hover:bg-emerald-700 shadow-emerald-200'}`}>
                                        {status === 'submitting' ? <Loader2 className="animate-spin mx-auto"/> : status === 'success' ? 'Request Received!' : 'Book Free Class'}
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const App = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [activeSection, setActiveSection] = useState('home');
            const [isScrolled, setIsScrolled] = useState(false);
            const [isMatcherOpen, setIsMatcherOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 50);
                    const sections = ['home', 'courses', 'methodology', 'faq', 'contact'];
                    for (const sec of sections) {
                        const el = document.getElementById(sec);
                        if (el && window.scrollY >= (el.offsetTop - 100)) {
                            setActiveSection(sec);
                        }
                    }
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollToSection = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                    setActiveSection(id);
                    setIsMenuOpen(false);
                }
            };

            return (
                <div className="font-sans text-slate-900 overflow-x-hidden flex flex-col min-h-screen">
                    <Navbar 
                        isScrolled={isScrolled} 
                        activeSection={activeSection} 
                        scrollToSection={scrollToSection} 
                        isMenuOpen={isMenuOpen} 
                        setIsMenuOpen={setIsMenuOpen} 
                        openMatcher={() => setIsMatcherOpen(true)}
                    />
                    
                    <main className="flex-grow">
                        <Hero scrollToSection={scrollToSection} openMatcher={() => setIsMatcherOpen(true)} />
                        <CoursesGrid />
                        <MethodologySection />
                        <FAQSection scrollToSection={scrollToSection} />
                        <ContactSection />
                    </main>

                    <AIChatWidget />
                    {isMatcherOpen && <CourseMatcher onClose={() => setIsMatcherOpen(false)} scrollToSection={scrollToSection} />}

                    <footer className="bg-slate-900 text-slate-400 py-12 border-t border-slate-800 overflow-hidden mt-auto">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex items-center gap-2">
                                <img src="./images/logobg.png" alt="TajweedEasy Logo" className="h-10 md:h-12 w-auto transform scale-[4.5] origin-left" />
                            </div>
                            <div className="text-sm">© 2026 TajweedEasy. All rights reserved.</div>
                            <div className="flex gap-6">
                                <a href="#" className="hover:text-emerald-500 transition-colors">Terms</a>
                                <a href="#" className="hover:text-emerald-500 transition-colors">Privacy</a>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
